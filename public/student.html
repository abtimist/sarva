<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Captions</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 { font-size: 1.1rem; color: #888; margin-bottom: 20px; font-weight: 400; }
    #lang-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .lang-btn {
      background: #1a1a1a;
      color: #fff;
      border: 2px solid #333;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-btn.active {
      background: #4ade80;
      color: #000;
      border-color: #4ade80;
      font-weight: 700;
    }
    #captions {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .caption-line {
      background: #111;
      border-left: 4px solid #4ade80;
      border-radius: 8px;
      padding: 16px 20px;
      font-size: 1.6rem;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #waiting {
      color: #444;
      font-size: 1.1rem;
      margin-top: 60px;
      text-align: center;
    }
    #connected-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f87171;
      display: inline-block;
      margin-right: 6px;
    }
    #connected-dot.on { background: #4ade80; }
    #conn-status { font-size: 0.8rem; color: #555; margin-bottom: 16px; display: flex; align-items: center; }
  </style>
</head>
<body>
  <h1>Live Classroom Captions</h1>

  <div id="conn-status">
    <span id="connected-dot"></span>
    <span id="conn-text">Connecting...</span>
  </div>

  <div id="lang-picker">
    <button class="lang-btn active" data-lang="en" onclick="setLang(this)">English</button>
    <button class="lang-btn" data-lang="hi" onclick="setLang(this)">हिन्दी</button>
    <button class="lang-btn" data-lang="ta" onclick="setLang(this)">தமிழ்</button>
    <button class="lang-btn" data-lang="kn" onclick="setLang(this)">ಕನ್ನಡ</button>
    <button class="lang-btn" data-lang="te" onclick="setLang(this)">తెలుగు</button>
    <button class="lang-btn" data-lang="ml" onclick="setLang(this)">മലയാളം</button>
  </div>

  <div id="captions">
    <div id="waiting">Waiting for teacher to start speaking...</div>
  </div>

  <script>
    let socket;
    if (typeof io !== "undefined") {
      socket = io(window.location.origin);
    } else {
      console.error("Socket.io library is not loaded.");
      const textEl = document.getElementById("conn-text");
      if (textEl) textEl.textContent = "Error: Socket.io failed to load";
    }
    let selectedLang = "original";
    const captionBuffer = [];

    if (socket) {
      socket.on("connect", () => {
        document.getElementById("connected-dot").classList.add("on");
        document.getElementById("conn-text").textContent = "Connected";
      });
      socket.on("disconnect", () => {
        document.getElementById("connected-dot").classList.remove("on");
        document.getElementById("conn-text").textContent = "Disconnected";
      });
    }

    function setLang(btn) {
      document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedLang = btn.dataset.lang;
      captionBuffer.length = 0;
      const container = document.getElementById("captions");
      container.innerHTML = '<div id="waiting" style="color:#444;font-size:1.1rem;margin-top:60px;text-align:center">Waiting for teacher to start speaking...</div>';
    }

    function renderBuffer() {
      const container = document.getElementById("captions");
      container.innerHTML = "";
      captionBuffer.forEach(data => {
        const div = document.createElement("div");
        div.className = "caption-line";
        div.textContent = data[selectedLang] || data.original;
        container.appendChild(div);
      });
      window.scrollTo(0, document.body.scrollHeight);
    }

    if (socket) {
      socket.on("caption", (data) => {
        document.getElementById("waiting")?.remove();
        captionBuffer.push(data);
        if (captionBuffer.length > 6) captionBuffer.shift();
        renderBuffer();
      });
    }
  </script>
</body>
</html>
